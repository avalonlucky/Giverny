<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Giverny · 设计任务工时结算</title>
    <meta name="description" content="设计兼职的工时记录、任务进展、交付文件归档与月度结算管理平台。支持甲方只读分享、PDF 导出与收入估算。" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Giverny · 设计任务工时结算" />
    <meta property="og:description" content="设计兼职的工时记录、任务进展、交付文件归档与月度结算管理平台。" />
    <meta property="og:image" content="/giverny-logo.png" />
    <meta name="twitter:card" content="summary" />
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    <!-- Geist 预览分支：Geist Sans / Geist Mono 字体 + 明暗主题初始化 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/fontsource/css/geist-sans@latest/index.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/fontsource/css/geist-mono@latest/index.css" />
    <script>
      (function () {
        var saved = localStorage.getItem('geist-theme')
        var theme = saved === 'dark' || saved === 'light'
          ? saved
          : (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
        document.documentElement.dataset.theme = theme
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <!-- Geist 预览分支：悬浮主题切换（位于 React 树外，不侵入业务代码） -->
    <button id="geist-theme-toggle" type="button" aria-label="Toggle Theme">◐</button>
    <script>
      document.getElementById('geist-theme-toggle').addEventListener('click', function () {
        var next = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark'
        document.documentElement.dataset.theme = next
        localStorage.setItem('geist-theme', next)
      })
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
