name = "designer-worklog"
main = "src/worker.ts"
compatibility_date = "2026-06-10"
compatibility_flags = ["nodejs_compat"]
account_id = "ccd312f47f0dca574199fa6e33758c6d"

# 生产仍只走自定义域名 mayeai.com；workers_dev 关闭，避免把生产暴露到 workers.dev。
# preview_urls 开启后，每次 `wrangler versions upload` 会生成独立的版本预览链接，
# 用于在不影响生产流量的情况下预览升级分支。
workers_dev = false
preview_urls = true

routes = [
  { pattern = "mayeai.com/*", zone_name = "mayeai.com" },
  { pattern = "www.mayeai.com/*", zone_name = "mayeai.com" }
]

# AI 调用统一走 Cloudflare AI Gateway（缓存提速 / 失败重试 / 用量看板 / 抗 503）。
# 只改 base URL 指向网关对应 provider；API key 由网关透传给上游，无需额外网关鉴权。
[vars]
DEEPSEEK_BASE_URL = "https://gateway.ai.cloudflare.com/v1/ccd312f47f0dca574199fa6e33758c6d/mayeai-gateway/deepseek"
GEMINI_BASE_URL = "https://gateway.ai.cloudflare.com/v1/ccd312f47f0dca574199fa6e33758c6d/mayeai-gateway/google-ai-studio/v1beta"

# Workers AI：Cloudflare 边缘自带开源模型，作为「文字主模型 → 备用模型 → Workers AI」链路的最后一道兜底。
[ai]
binding = "AI"

# Vectorize：历史任务/交付件的语义搜索向量库（bge-m3 多语向量，1024 维，cosine）。
[[vectorize]]
binding = "VECTORIZE"
index_name = "worklog-search"

# Browser Rendering：服务端无头浏览器，把结算回单渲染成清晰矢量 PDF。
[browser]
binding = "BROWSER"

# Queues：交付件 AI 分析异步队列。上传后入队，专用消费者用独立 CPU 预算逐条分析、失败自动重试，
# 不再占用上传请求的预算；cron 仍作兜底。
[[queues.producers]]
binding = "ANALYSIS_QUEUE"
queue = "worklog-analysis"

[[queues.consumers]]
queue = "worklog-analysis"
max_batch_size = 3
max_batch_timeout = 10
max_retries = 3

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = true

[triggers]
crons = ["*/5 * * * *"]

[[d1_databases]]
binding = "DB"
database_name = "designer-worklog-db"
database_id = "4b784afe-7d17-4b22-b101-bec380ddc075"
migrations_dir = "db/migrations"

[[r2_buckets]]
binding = "UPLOADS"
bucket_name = "designer-worklog-uploads"
