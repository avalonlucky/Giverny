name = "designer-worklog"
main = "src/worker.ts"
compatibility_date = "2026-06-10"
account_id = "ccd312f47f0dca574199fa6e33758c6d"

# 生产仍只走自定义域名 mayeai.com；workers_dev 关闭，避免把生产暴露到 workers.dev。
# preview_urls 开启后，每次 `wrangler versions upload` 会生成独立的版本预览链接，
# 用于在不影响生产流量的情况下预览升级分支。
workers_dev = false
preview_urls = true

routes = [
  { pattern = "mayeai.com/*", zone_name = "mayeai.com" },
  { pattern = "www.mayeai.com/*", zone_name = "mayeai.com" }
]

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = true

[triggers]
crons = ["*/5 * * * *"]

[[d1_databases]]
binding = "DB"
database_name = "designer-worklog-db"
database_id = "4b784afe-7d17-4b22-b101-bec380ddc075"
migrations_dir = "db/migrations"

[[r2_buckets]]
binding = "UPLOADS"
bucket_name = "designer-worklog-uploads"
