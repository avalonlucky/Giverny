  <text x="920" y="454" font-family="Inter, Arial, sans-serif" font-size="14" fill="#5f6d70">进度更新为 80%</text>
  <circle cx="898" cy="493" r="7" fill="#2f6f6d"/>
  <text x="920" y="499" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800" fill="#17282f">验收附件</text>
  <text x="920" y="525" font-family="Inter, Arial, sans-serif" font-size="14" fill="#5f6d70">上传最终稿与证明文件</text>
  <rect x="876" y="548" width="236" height="12" rx="6" fill="#dfe4e0"/>
  <rect x="876" y="548" width="188" height="12" rx="6" fill="#2f6f6d"/>
