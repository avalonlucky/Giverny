    <text x="24" y="68" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800" fill="#17282f">8.0h</text>
    <rect x="236" width="210" height="92" rx="18" fill="#f8f9f5"/>
    <text x="260" y="34" font-family="Inter, Arial, sans-serif" font-size="14" fill="#8a9496">计费工时</text>
    <text x="260" y="68" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800" fill="#17282f">8.0h</text>
    <rect x="472" width="210" height="92" rx="18" fill="#f8f9f5"/>
    <text x="496" y="34" font-family="Inter, Arial, sans-serif" font-size="14" fill="#8a9496">预计收入</text>
    <text x="496" y="68" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800" fill="#17282f">¥2400</text>
    <rect x="708" width="210" height="92" rx="18" fill="#f8f9f5"/>
