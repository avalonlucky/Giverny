  <rect x="980" y="102" width="170" height="44" rx="14" fill="#2f6f6d"/>
  <text x="1065" y="130" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#ffffff">新建任务</text>
  <g transform="translate(204 206)">
    <rect width="210" height="92" rx="18" fill="#f8f9f5"/>
