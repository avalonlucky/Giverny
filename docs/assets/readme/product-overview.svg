  <rect x="204" y="330" width="610" height="250" rx="24" fill="#f8f9f5"/>
  <text x="232" y="370" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800" fill="#17282f">任务明细</text>
  <rect x="232" y="398" width="542" height="54" rx="16" fill="#eef5ef" stroke="#9fbdb8"/>
