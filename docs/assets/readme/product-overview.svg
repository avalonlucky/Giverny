<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Giverny product overview</title>
  <desc id="desc">A visual overview of Giverny's dashboard, task list, progress panel, timeline, and settlement cards.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8f9f5"/>
      <stop offset="1" stop-color="#eeefe9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#17282f" flood-opacity="0.13"/>
    </filter>
  </defs>
  <rect width="1280" height="720" rx="32" fill="url(#bg)"/>
  <rect x="72" y="64" width="1136" height="592" rx="30" fill="#fdfdfb" filter="url(#shadow)"/>
  <rect x="72" y="64" width="92" height="592" rx="30" fill="#eeefe9"/>
  <circle cx="118" cy="112" r="24" fill="#2f6f6d"/>
  <text x="118" y="121" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800" fill="#ffffff">G</text>
  <rect x="96" y="174" width="44" height="12" rx="6" fill="#2f6f6d"/>
  <rect x="96" y="214" width="44" height="12" rx="6" fill="#c6cfca"/>
  <rect x="96" y="254" width="44" height="12" rx="6" fill="#c6cfca"/>
