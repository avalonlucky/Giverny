name: Record production deployment

on:
  workflow_dispatch:
    inputs:
      description:
        description: "What was deployed or verified"
        required: false
        default: "Production deployment verified"

permissions:
  contents: read

jobs:
  record:
    name: Record deployment status only
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://mayeai.com
    steps:
      - name: Record deployment note
        run: |
          echo "${{ inputs.description }}"
          echo "Recorded only; this workflow does not deploy to Cloudflare."
