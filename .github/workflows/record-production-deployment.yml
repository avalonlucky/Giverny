name: Record production deployment

on:
  workflow_dispatch:
    inputs:
      description:
        description: "What was deployed or verified"
        required: false
        default: "Production deployment verified"

permissions:
  contents: read
  deployments: write

jobs:
  record:
    name: Record deployment status only
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://mayeai.com
    steps:
      - name: Create GitHub deployment record
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
          GH_SHA: ${{ github.sha }}
          DEPLOY_DESCRIPTION: ${{ inputs.description }}
        run: |
          set -euo pipefail
          python3 <<'PY'
          import json
          import os
          import urllib.request

          token = os.environ["GH_TOKEN"]
          repo = os.environ["GH_REPOSITORY"]
          run_id = os.environ["GITHUB_RUN_ID"]
          server_url = os.environ["GITHUB_SERVER_URL"]

          headers = {
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
          }

          def post(path, payload):
              request = urllib.request.Request(
                  f"https://api.github.com/repos/{repo}{path}",
                  data=json.dumps(payload).encode("utf-8"),
                  headers=headers,
                  method="POST",
              )
              with urllib.request.urlopen(request) as response:
                  return json.loads(response.read().decode("utf-8"))

          deployment = post("/deployments", {
              "ref": os.environ["GH_SHA"],
              "environment": "production",
              "description": os.environ.get("DEPLOY_DESCRIPTION") or "Production deployment verified",
              "auto_merge": False,
              "required_contexts": [],
          })

          post(f"/deployments/{deployment['id']}/statuses", {
              "state": "success",
              "environment": "production",
              "environment_url": "https://mayeai.com",
              "log_url": f"{server_url}/{repo}/actions/runs/{run_id}",
              "description": "Recorded only; this workflow does not deploy to Cloudflare.",
          })
          PY
