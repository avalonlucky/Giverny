<title>Giverny · README (Multi-language)</title>
<style>
  :root{
    --text:#17282f; --text-2:#5f6d70; --text-3:#8a9496;
    --primary:#2f6f6d; --primary-2:#1f4751;
    --line:#e3e6df; --line-2:#d4d9cf;
    --bg:#f8f9f5; --bg-2:#fdfdfb; --bg-code:#eef1ea;
    --warn-bg:rgba(230,164,58,.16);
    --radius:8px;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);
    font-family:-apple-system,"PingFang SC","Microsoft YaHei","Hiragino Sans",system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;line-height:1.7;padding:0 16px 80px}
  .page{max-width:840px;margin:0 auto;padding:20px 0 48px}

  /* ===== 语言切换器（固定在右上）===== */
  .lang-bar{position:sticky;top:0;z-index:50;background:rgba(248,249,245,.92);
    backdrop-filter:blur(8px);border-bottom:1px solid var(--line);
    padding:10px 0;margin:0 -16px 24px;display:flex;align-items:center;justify-content:center;gap:4px;flex-wrap:wrap}
  .lang-btn{padding:6px 14px;border:1px solid var(--line-2);background:var(--bg-2);color:var(--text-2);
    font-size:13px;font-weight:500;border-radius:18px;cursor:pointer;font-family:inherit;transition:all .15s}
  .lang-btn:hover{border-color:var(--primary);color:var(--primary)}
  .lang-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
  .lang-flag{font-size:14px;margin-right:3px}

  /* hero */
  .hero{text-align:center;padding:24px 0 32px;border-bottom:1px solid var(--line);margin-bottom:32px}
  .hero .logo{width:88px;height:88px;border-radius:20px;background:var(--primary);
    display:inline-flex;align-items:center;justify-content:center;color:#fff;font-size:38px;font-weight:800;margin-bottom:14px}
  .hero h1{font-size:32px;font-weight:800;margin:0 0 8px;letter-spacing:-.01em}
  .hero .tagline{font-size:15px;color:var(--text-2);margin:0 0 16px}
  .hero .links{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
  .hero .links a{font-size:13px;color:var(--primary);text-decoration:none;padding:6px 14px;
    background:rgba(47,111,109,.1);border-radius:20px;font-weight:500}
  .hero .links a:hover{background:rgba(47,111,109,.18)}
  .badges{display:flex;gap:8px;justify-content:center;margin-top:16px;flex-wrap:wrap}
  .badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;
    padding:3px 10px;border-radius:12px;border:1px solid var(--line-2);background:var(--bg-2);color:var(--text-2)}
  .badge .dot{width:6px;height:6px;border-radius:50%;background:var(--primary)}

  .one-liner{background:var(--bg-2);border-left:3px solid var(--primary);padding:14px 20px;
    border-radius:0 8px 8px 0;margin:0 0 32px;font-size:15px;color:var(--text)}
  .one-liner b{color:var(--primary-2)}

  h2{font-size:22px;font-weight:700;margin:40px 0 14px;padding-bottom:8px;border-bottom:1px solid var(--line);color:var(--text)}
  h2:first-of-type{margin-top:8px}
  h3{font-size:17px;font-weight:600;margin:28px 0 10px;color:var(--primary-2)}
  h4{font-size:14px;font-weight:600;margin:18px 0 8px;color:var(--text)}
  p{margin:0 0 12px;font-size:15px;color:var(--text)}
  strong{color:var(--text);font-weight:600}
  a{color:var(--primary);text-decoration:none}
  a:hover{text-decoration:underline}

  code{font-family:"SF Mono",Menlo,Consolas,monospace;font-size:13px;background:var(--bg-code);
    padding:2px 6px;border-radius:4px;color:var(--primary-2)}
  pre{background:var(--bg-code);border:1px solid var(--line);border-radius:8px;padding:14px 16px;
    overflow-x:auto;margin:0 0 16px}
  pre code{background:none;padding:0;font-size:13px;color:var(--text);line-height:1.6}

  .table-wrap{overflow-x:auto;margin:0 0 16px}
  table{width:100%;border-collapse:collapse;font-size:14px}
  th,td{padding:9px 14px;text-align:left;border-bottom:1px solid var(--line)}
  th{background:var(--bg-2);font-weight:600;color:var(--text-2);font-size:13px}
  td{color:var(--text)}
  td:first-child{font-weight:500}
  .yes{color:#2e7d32;font-weight:600}
  .no{color:var(--text-3)}

  ul,ol{padding-left:22px;margin:0 0 14px}
  li{font-size:15px;color:var(--text);margin-bottom:5px}
  li b{color:var(--primary-2)}

  blockquote{margin:0 0 16px;padding:11px 18px;background:var(--warn-bg);border-left:3px solid #c89028;
    border-radius:0 6px 6px 0;font-size:14px;color:#6b5520}
  blockquote b{color:#4a3a10}

  hr{border:none;border-top:1px solid var(--line);margin:32px 0}

  .flow{background:var(--bg-2);border:1px solid var(--line);border-radius:10px;padding:22px;margin:0 0 18px;text-align:center}
  .flow .chain{display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:5px;font-size:13px}
  .flow .node{padding:7px 13px;background:rgba(47,111,109,.1);color:var(--primary-2);border-radius:6px;font-weight:500;white-space:nowrap}
  .flow .arr{color:var(--text-3);font-size:16px}

  .arch{background:var(--bg-2);border:1px solid var(--line);border-radius:10px;padding:18px;margin:0 0 18px}
  .arch .layer{display:flex;align-items:center;gap:14px;padding:9px 0;border-bottom:1px solid var(--line)}
  .arch .layer:last-child{border-bottom:none}
  .arch .layer .lname{font-size:13px;font-weight:600;color:var(--text-2);width:80px;flex:none}
  .arch .layer .ltech{font-size:14px;color:var(--text)}
  .arch .layer .ltech b{color:var(--primary-2);font-weight:600}
  .arch .layer .ldesc{font-size:12px;color:var(--text-3);margin-left:auto;max-width:260px}

  .scenario{background:var(--bg-2);border:1px solid var(--line);border-radius:8px;padding:13px 18px;margin:0 0 12px}
  .scenario h4{margin:0 0 5px;color:var(--primary-2)}

  .shots{display:grid;gap:18px;margin:0 0 20px}
  .shot{background:var(--bg-2);border:1px solid var(--line);border-radius:10px;padding:10px}
  .shot h3{margin:2px 4px 10px;font-size:15px}
  .shot img{display:block;width:100%;height:auto;border-radius:8px;border:1px solid var(--line);background:#fff}

  .footer-note{margin-top:36px;padding:14px 20px;background:var(--bg-2);border:1px solid var(--line);
    border-radius:8px;font-size:13px;color:var(--text-3);text-align:center}
  .footer-note a{color:var(--primary)}
</style>
</head>

      <div class="logo">G</div>
      <h1>Giverny</h1>
      <p class="tagline">${t.tagline}</p>
      <div class="links">
        <a href="https://mayeai.com">mayeai.com</a>
        <a href="https://github.com/avalonlucky/Giverny">GitHub</a>
        <a href="https://github.com/avalonlucky/Giverny/releases">Releases</a>
      </div>
      <div class="badges">
        <span class="badge"><span class="dot"></span> React 19 · TypeScript · Vite</span>
        <span class="badge"><span class="dot" style="background:#f6821f"></span> Cloudflare · D1 · R2</span>
      </div>
    </div>

    <div class="one-liner">${t.oneLiner}</div>

    <h2>${t.shotsTitle}</h2>
    <p>${t.shotsDesc}</p>
    <div class="shots">
      <div class="shot"><h3>${t.shots[0]}</h3><img src="/readme/screenshots/dashboard.png" alt="Giverny dashboard screenshot" /></div>
      <div class="shot"><h3>${t.shots[1]}</h3><img src="/readme/screenshots/tasks.png" alt="Giverny tasks screenshot" /></div>
      <div class="shot"><h3>${t.shots[2]}</h3><img src="/readme/screenshots/income.png" alt="Giverny income screenshot" /></div>
    </div>

    <h2>${t.what}</h2>
    <p>${t.whatDesc}</p>
    <div class="flow"><div class="chain">${t.flow.map((n,i)=>`${i>0?'<span class="arr">→</span>':''}<span class="node">${n}</span>`).join('')}</div></div>
    <p>${t.whatServes}</p>
    <p>${t.whatNot}</p>

    <h2>${t.whyTitle}</h2>
    <p>${t.whyDesc}</p>
    <ul>${t.whyList.map(x=>`<li>${x}</li>`).join('')}</ul>
    <p>${t.whyEnd}</p>

    <h2>${t.whoTitle}</h2>
    <div class="table-wrap"><table>
      <thead><tr>${t.whoCols.map(c=>`<th>${c}</th>`).join('')}</tr></thead>
      <tbody>${t.who.map(r=>`<tr><td><strong>${r.role}</strong></td><td>${r.need}</td><td>${r.provide}</td></tr>`).join('')}</tbody>
    </table></div>

    <h2>${t.flowTitle}</h2>
    <ol>${t.flowSteps.map(s=>`<li>${s}</li>`).join('')}</ol>
    <h3>${t.sceneTitle}</h3>
    <div class="scenario"><h4>${t.scene1T}</h4><p style="margin:0">${t.scene1D}</p></div>
    <div class="scenario"><h4>${t.scene2T}</h4><p style="margin:0">${t.scene2D}</p></div>

    <h2>${t.modTitle}</h2>
    <div class="table-wrap"><table>
      <thead><tr>${t.modCols.map(c=>`<th>${c}</th>`).join('')}</tr></thead>
      <tbody>${t.mods.map(m=>`<tr><td><strong>${m.name}</strong></td><td>${m.desc}</td></tr>`).join('')}</tbody>
    </table></div>

    <h2>${t.ruleTitle}</h2>
    <p>${t.ruleIntro}</p>
    <h3>${t.rule1T}</h3><p>${t.rule1D}</p>
    <h3>${t.rule2T}</h3><p>${t.rule2D}</p>
    <blockquote>${t.rule2Warn}</blockquote>
    <h3>${t.rule3T}</h3><p>${t.rule3D}</p>
    <h3>${t.rule4T}</h3><p>${t.rule4D}</p>

    <h2>${t.roleTitle}</h2>
    <div class="table-wrap"><table>
      <thead><tr>${t.roleCols.map(c=>`<th>${c}</th>`).join('')}</tr></thead>
      <tbody>${t.roles.map(r=>`<tr><td>${r[0]}</td>${r.slice(1).map(v=>`<td>${v}</td>`).join('')}</tr>`).join('')}</tbody>
    </table></div>
    <p>${t.roleNote}</p>

    <h2>${t.techTitle}</h2>
    <div class="arch">${t.tech.map(l=>`<div class="layer"><span class="lname">${l.name}</span><span class="ltech">${l.tech}</span><span class="ldesc">${l.desc}</span></div>`).join('')}</div>
    <p>${t.techEntry}</p>

    <h2>${t.devTitle}</h2>
    <pre><code>npm install
npm run dev          <span style="color:var(--text-3)">${t.devComment}</span></code></pre>
    <pre><code>npm run lint
npm run build</code></pre>

    <h2>${t.deployTitle}</h2>
    <blockquote>${t.deployWarn}</blockquote>
    <pre><code>env -u ALL_PROXY -u HTTPS_PROXY -u HTTP_PROXY npm run deploy:worker</code></pre>
    <p>${t.deployRes}</p>
    <p>${t.deployStepsTitle}</p>
    <ol>${t.deploySteps.map(s=>`<li>${s}</li>`).join('')}</ol>

    <h2>${t.docTitle}</h2>
    <div class="table-wrap"><table>
      <thead><tr>${t.docCols.map(c=>`<th>${c}</th>`).join('')}</tr></thead>
      <tbody>${t.docs.map(d=>`<tr><td>${d[0]}</td><td>${d[1]}</td></tr>`).join('')}</tbody>
    </table></div>

    <div class="footer-note">
      🌐 Multi-language README preview · <a href="#" onclick="document.getElementById('lang-bar').scrollIntoView();return false">↑ switch language</a>
    </div>
  `;
  window.scrollTo(0,0);
}

function switchLang(code){ currentLang=code; renderLangBar(); render(); }
function $(id){ return document.getElementById(id); }

renderLangBar();
render();
</script>
</body>
</html>
